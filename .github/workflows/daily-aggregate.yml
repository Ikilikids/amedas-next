name: Daily Heat Aggregation

on:
  schedule:
    - cron: '55 14 * * *' # 日本時間の 23:55 (UTC 14:55)
  workflow_dispatch: # 手動実行用ボタン

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Run aggregation script
        run: node scripts/aggregate-daily-max.mjs

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ranking/daily_max.json
          git commit -m "Update daily max temperature rankings [skip ci]" || echo "No changes to commit"
          git push
